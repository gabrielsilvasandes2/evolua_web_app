<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="shortcut icon" href="imagens/favicon.png" type="image/x-icon">
</head>

<body>
    <main>
        <section id="login">
            <div id="imagem"></div>

            <div id="formulario">
                <h1>Faça seu Login</h1>
                <p>
                    Seja bem-vindo(a) novamente. Faça login para acessar sua conta
                    e poder fazer as configurações no seu ambiente.
                </p>

                <!-- Removido action e method -->
                <form id="loginForm" autocomplete="on">

                    <div class="campo">
                        <i class="bi bi-person-fill"></i>
                        <input type="email"
                            name="login"
                            id="ilogin"
                            placeholder="Seu e-mail"
                            autocomplete="email"
                            required
                            maxlength="254">
                        <label for="ilogin">Login</label>
                    </div>

                    <div class="campo">
                        <i class="bi bi-key-fill"></i>
                        <input type="password"
                            name="senha"
                            id="isenha"
                            placeholder="Sua senha"
                            autocomplete="current-password"
                            required
                            minlength="8">
                        <label for="isenha">Senha</label>
                    </div>

                    <input type="submit" value="Entrar">

                    <!-- Importante: tipo button para não enviar form -->
                    <button type="button" class="botao">
                        Esqueci a Senha <i class="bi bi-envelope-fill"></i>
                    </button>

                    <a href="index.html">Não tenho Login</a>
                </form>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("loginForm");

            form.addEventListener("submit", (e) => {
                e.preventDefault(); // impede POST

                // Aqui você pode validar futuramente

                window.location.href = "dashboard.html";
            });
        });
    </script>

</body>
</html>
