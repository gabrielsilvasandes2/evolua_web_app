<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="shortcut icon" href="imagens/favicon.png" type="image/x-icon">
</head>

<body>
    <main>
        <section id="login">
            <div id="imagem"></div>

            <div id="formulario">
                <h1>Cadastre-se</h1>
                <p>
                    Seja bem-vindo(a). Faça seu cadastro para acessar sua conta
                    e poder fazer as configurações no seu ambiente.
                </p>

                <!-- REMOVIDO action e method -->
                <form id="cadastroForm" autocomplete="on">

                    <div class="campo">
                        <i class="bi bi-person-fill"></i>
                        <input type="email"
                            name="login"
                            id="ilogin"
                            placeholder="Seu e-mail"
                            autocomplete="email"
                            required
                            maxlength="254">
                        <label for="ilogin">Login</label>
                    </div>

                    <div class="campo">
                        <i class="bi bi-key-fill"></i>
                        <input type="password"
                            name="senha"
                            id="isenha"
                            placeholder="Sua senha"
                            autocomplete="current-password"
                            required
                            minlength="8">
                        <label for="isenha">Senha</label>
                    </div>

                    <input type="submit" value="Criar Conta">
                    <a href="login.html">Já tenho Conta</a>
                </form>
            </div>
        </section>
    </main>

    <!-- Script para impedir POST e redirecionar -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("cadastroForm");

            form.addEventListener("submit", (e) => {
                e.preventDefault(); // impede envio POST

                // Aqui você pode futuramente validar dados

                // Redireciona para dashboard
                window.location.href = "dashboard.html";
            });
        });
    </script>

</body>
</html>
