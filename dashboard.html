<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Início</title>
    <link rel="shortcut icon" href="imagens/favicon.png" type="image/x-icon">
</head>
<body>
    <nav id="sidebar">
        <div id="sidebar_content">
            <div id="user">

                <abbr title="Carregar foto de perfil">
                    <img src="imagens/user-icon.png" id="user_avatar" alt="Avatar">
                </abbr>

                <input type="file" id="fotoPerfil" name="fotoPerfil" accept="image/*" hidden>

                <p id="user_infos">
                    <span class="item-description" style="color: white">
                        Usuário
                    </span>
                    <span class="item-description">
                        Estudante
                    </span>
                </p>
            </div>

            <ul id="side_items">
                <li class="side-item active">
                    <a href="#">
                        <i class="fa-solid fa-chart-line"></i>
                        <span class="item-description">
                            Menu
                        </span>
                    </a>
                </li>

                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-user"></i>
                        <span class="item-description">
                            Minha Conta
                        </span>
                    </a>
                </li>

                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-bell"></i>
                        <span class="item-description">
                            Notificações
                        </span>
                    </a>
                </li>

                <li class="side-item">
                    <a href="#">
                        <i class="fa-solid fa-gear"></i>
                        <span class="item-description">
                            Configurações
                        </span>
                    </a>
                </li>
            </ul>

            <button id="open_btn">
                <i id="open_btn_icon" class="fa-solid fa-chevron-right"></i>
            </button>
        </div>

        <div id="logout">
            <button id="logout_btn">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span class="item-description">
                    Sair
                </span>
            </button>
        </div>
    </nav>

    <main>
        <h1 style="color: white; padding-left: 20px">Menu</h1>
        <p style="color: white; padding-left: 20px">Escolha uma das opções disponíveis</p>
        <section class="componentes">
            <a href="#" style="text-decoration: none; color: white">
                <h2>Temporizador Pomodoro</h2>
                <p>Recomendável se você quer ter foco nos estudos.</p>
            </a>
        </section>
        <section class="componentes">
            <a href="#" style="text-decoration: none; color: white">
                <h2>Como Socializar?</h2>
                <p>Recomendável se você quer melhorar seu lado extrovertido(a).</p>
            </a>
        </section>

    </main>
    <script src="script/script.js"></script>
</body>
</html>
